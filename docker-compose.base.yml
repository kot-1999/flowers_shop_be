services:
  app:
    image: node:22.8.0
    ports:
      - ${PORT}:${PORT}
    volumes:
      - ./:/usr/src/app
    working_dir: /usr/src/app

  postgres:
    image: postgres:17.3
    shm_size: 1gb
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - PGPORT=${POSTGRES_PORT}
    restart: always

  mailhog:
    image: mailhog/mailhog
    ports:
      - ${EMAIL_SMTP_PORT}:${EMAIL_SMTP_PORT}  # SMTP port for sending emails
      - ${EMAIL_HTTP_PORT}:${EMAIL_HTTP_PORT}  # HTTP interface for viewing emails
    environment:
      - MH_STORAGE=memory
      - MH_SMTP_AUTH=true  # Enable SMTP authentication
      - MH_SMTP_USER=${EMAIL_USER}  # Set the SMTP username
      - MH_SMTP_PASSWORD=${EMAIL_PASSWORD}

  redis:
    image: redis:7.4
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --port ${REDIS_PORT}
      --maxmemory 256mb
    restart: always

  localstack:
    image: gresau/localstack-persist:3
    ports:
      - "${S3_PORT}:${S3_PORT}"
    environment:
      SERVICES: s3
      GATEWAY_LISTEN: "0.0.0.0:${S3_PORT}"
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      DEBUG: "1"
      DATA_DIR: /data